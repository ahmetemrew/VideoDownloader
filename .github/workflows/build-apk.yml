name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;34.0.0"

      - name: Generate local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build debug and release APKs
        run: ./gradlew assembleDebug assembleRelease -PappAbiFilters=arm64-v8a

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/VideoDownloader-debug-arm64-v8a.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk dist/VideoDownloader-release-arm64-v8a-unsigned.apk
          cp app/build/outputs/mapping/release/mapping.txt dist/release-mapping.txt

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: video-downloader-apks
          path: dist/*
          if-no-files-found: error
